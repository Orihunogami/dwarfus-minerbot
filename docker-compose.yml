services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gm
      POSTGRES_PASSWORD: gmpass
      POSTGRES_DB: goldenminer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gm -d goldenminer"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://gm:gmpass@db:5432/goldenminer
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
